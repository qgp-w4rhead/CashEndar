# CashEndar — Nginx config for the FRONTEND machine
# Serves the Vue static build and reverse-proxies /api to the backend machine.
#
# Usage:
#   1. Build the frontend:  npm run build  (outputs to dist/)
#   2. Copy dist/ contents to /var/www/cashendar/
#   3. Copy this file to /etc/nginx/sites-available/cashendar
#   4. ln -s /etc/nginx/sites-available/cashendar /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Replace BACKEND_IP with the actual private IP of your backend machine.

upstream cashendar_api {
    server BACKEND_IP:3001;
}

server {
    listen 80;
    server_name cashendar.yourdomain.com;

    # Redirect HTTP to HTTPS (uncomment when TLS is ready)
    # return 301 https://$host$request_uri;

    root /var/www/cashendar;
    index index.html;

    # Serve Vue SPA — all non-API, non-file routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API requests to the backend machine
    location /api/ {
        proxy_pass http://cashendar_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}

