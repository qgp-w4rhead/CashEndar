# CashEndar — MongoDB config for the DB machine
# Copy to /etc/mongod.conf on the DB machine.
#
# SETUP STEPS:
#   1. Start mongod without auth first to create the admin + app users:
#        mongosh
#        > use admin
#        > db.createUser({ user: "admin", pwd: "STRONG_ADMIN_PASSWORD", roles: ["root"] })
#        > use cashendar
#        > db.createUser({ user: "cashendar_app", pwd: "STRONG_APP_PASSWORD", roles: [{ role: "readWrite", db: "cashendar" }] })
#   2. Then enable auth by uncommenting the security section below and restart mongod.
#   3. Configure firewall:
#        sudo ufw allow from BACKEND_IP to any port 27017
#        sudo ufw deny 27017

storage:
  dbPath: /var/lib/mongodb
  journal:
    enabled: true
  wiredTiger:
    engineConfig:
      cacheSizeGB: 1

systemLog:
  destination: file
  logAppend: true
  path: /var/log/mongodb/mongod.log

net:
  port: 27017
  # CRITICAL: Bind ONLY to the private LAN IP (never 0.0.0.0)
  # Replace DB_PRIVATE_IP with the actual private IP of this machine
  bindIp: 127.0.0.1,DB_PRIVATE_IP

processManagement:
  timeZoneInfo: /usr/share/zoneinfo

# --- SECURITY: Uncomment after creating users (see steps above) ---
# security:
#   authorization: enabled
#   javascriptEnabled: false

# --- TLS: Uncomment after placing certs on the DB machine ---
# net:
#   tls:
#     mode: requireTLS
#     certificateKeyFile: /etc/ssl/mongodb/mongo.pem
#     CAFile: /etc/ssl/mongodb/ca.pem

